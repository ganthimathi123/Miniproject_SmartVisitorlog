<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Door Access - Smart Home</title>
  <link rel="stylesheet" href="qr-access.css">
</head>
<body>
  <div id="app">
    
    <!-- Step 1: Category Selection -->
    <div id="category-screen" class="screen active">
      <div class="container">
        <h1>Welcome!</h1>
        <p>Please select your category</p>

        <div class="category-grid">
          <button class="category-btn" data-category="family">рџ‘ЁвЂЌрџ‘©вЂЌрџ‘§вЂЌрџ‘¦ Family</button>
          <button class="category-btn" data-category="friends">рџ‘Ґ Friends</button>
          <button class="category-btn" data-category="servants">рџ§№ Servants</button>
          <button class="category-btn" data-category="delivery">рџ“¦ Delivery</button>
          <button class="category-btn" data-category="guest">рџљЄ Guest</button>
        </div>
      </div>
    </div>

    <!-- Step 2: Phone -->
    <div id="phone-screen" class="screen">
      <div class="container">
        <h2>Enter Your Details</h2>
        <form id="phone-form">
          <input type="text" id="visitor-name" placeholder="Your Name" required>
          <input type="tel" id="phone-number" placeholder="Phone Number" required>
          <button type="submit">Continue</button>
        </form>
        <button onclick="goBack()">в†ђ Back</button>
      </div>
    </div>

    <!-- Step 3: OTP -->
    <div id="otp-screen" class="screen">
      <div class="container">
        <h2>Enter OTP</h2>
        <div id="otp-display"></div>
        <input id="otp-input" placeholder="Enter OTP">
        <button id="verify-otp-btn">Verify</button>
      </div>
    </div>

    <!-- Step 4: Waiting -->
    <div id="waiting-screen" class="screen">
      <div class="container">
        <h2>Waiting for Admin</h2>
        <p>Please wait...</p>
      </div>
    </div>

    <!-- Step 5: Face -->
    <div id="face-screen" class="screen">
      <div class="container">
        <h2>Face Verification</h2>
        <video id="face-video" autoplay></video>
        <button id="capture-face-btn">Capture</button>
      </div>
    </div>

    <!-- Step 6: Success -->
    <div id="success-screen" class="screen">
      <h2>Access Granted вњ…</h2>
    </div>

    <!-- Step 7: Denied -->
    <div id="denied-screen" class="screen">
      <h2>Access Denied вќЊ</h2>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
  <script src="qr-access.js"></script>

</body>
</html>
